services:
  bot:
    build: .
    env_file: .env
    ports:
      - "${WEB_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
    restart: unless-stopped

  # Optional PostgreSQL. To use it, set in .env:
